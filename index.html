<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4a7c6f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="제주스테이">
<title>제주스테이 — Jeju Stay</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="제주스테이">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #7a9e8e;
    --sage-deep: #4a7c6f;
    --sage-light: #a8c5b5;
    --sage-pale: #d4e6dd;
    --mint: #c8ddd5;
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --earth: #8b7355;
    --earth-light: #c4a882;
    --dark: #1e2a25;
    --text: #2d3d35;
    --text-light: #6b8a7a;
    --text-muted: #9ab5a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--warm-white);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── LANGUAGE SWITCHER ── */
  .lang-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px;
    background: rgba(245, 240, 232, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(122, 158, 142, 0.2);
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--sage-deep);
    letter-spacing: 0.04em;
  }

  .logo span {
    font-style: italic;
    font-weight: 300;
    color: var(--earth);
  }

  .lang-buttons {
    display: flex;
    gap: 4px;
    background: rgba(122, 158, 142, 0.12);
    border-radius: 24px;
    padding: 4px;
  }

  .lang-btn {
    padding: 6px 14px;
    border: none;
    background: transparent;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .lang-btn.active {
    background: var(--sage-deep);
    color: white;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 100px 24px 60px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(122, 158, 142, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(200, 221, 213, 0.25) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(168, 197, 181, 0.1) 0%, transparent 70%),
      var(--warm-white);
  }

  .hero-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    animation: float 8s ease-in-out infinite;
  }

  .orb1 {
    width: 400px; height: 400px;
    background: rgba(122, 158, 142, 0.15);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }

  .orb2 {
    width: 300px; height: 300px;
    background: rgba(196, 168, 130, 0.12);
    bottom: 0; right: -80px;
    animation-delay: -3s;
  }

  .orb3 {
    width: 200px; height: 200px;
    background: rgba(168, 197, 181, 0.2);
    top: 40%; left: 60%;
    animation-delay: -5s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .hero-eyebrow {
    position: relative;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: var(--sage-deep);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.3s;
  }

  .hero-title {
    position: relative;
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(42px, 8vw, 80px);
    font-weight: 300;
    line-height: 1.15;
    color: var(--dark);
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.5s;
  }

  .hero-title em {
    font-style: italic;
    color: var(--sage-deep);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1em;
  }

  .hero-subtitle {
    position: relative;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 300;
    font-style: italic;
    color: var(--earth);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.7s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── SEARCH BAR ── */
  .search-wrap {
    position: relative;
    width: 100%;
    max-width: 640px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.9s;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: white;
    border-radius: 60px;
    padding: 8px 8px 8px 28px;
    box-shadow: 0 8px 40px rgba(74, 124, 111, 0.15), 0 2px 8px rgba(0,0,0,0.06);
    gap: 12px;
  }

  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: transparent;
  }

  .search-bar input::placeholder { color: var(--text-muted); }

  .search-btn {
    background: var(--sage-deep);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.25s ease;
    white-space: nowrap;
  }

  .search-btn:hover { background: var(--dark); transform: scale(1.02); }

  /* ── FILTERS ── */
  .filters-section {
    padding: 48px 24px 32px;
    max-width: 1100px;
    margin: 0 auto;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.1s;
  }

  .filter-group {
    margin-bottom: 28px;
  }

  .filter-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: block;
  }

  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 8px 18px;
    border-radius: 50px;
    border: 1.5px solid var(--sage-light);
    background: transparent;
    color: var(--text-light);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .chip:hover, .chip.active {
    background: var(--sage-deep);
    border-color: var(--sage-deep);
    color: white;
  }

  /* ── SECTION TITLE ── */
  .section-head {
    max-width: 1100px;
    margin: 0 auto;
    padding: 8px 24px 24px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--dark);
  }

  .section-title span {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--sage-deep);
    font-size: 0.9em;
    margin-left: 8px;
  }

  .view-all {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 1px solid var(--text-muted);
    padding-bottom: 2px;
    transition: color 0.2s;
  }

  .view-all:hover { color: var(--sage-deep); border-color: var(--sage-deep); }

  /* ── CARDS ── */
  .cards-grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  .card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 2px 16px rgba(74, 124, 111, 0.08);
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(74, 124, 111, 0.18);
  }

  .card-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    position: relative;
    overflow: hidden;
  }

  /* 이미지 없을 때 배경 */
  .card-img-placeholder {
    width: 100%;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
  }

  .card-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    color: var(--sage-deep);
    letter-spacing: 0.05em;
  }

  .card-fav {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .card-fav:hover { transform: scale(1.15); }

  .card-body {
    padding: 18px 20px 20px;
  }

  .card-area {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .card-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--dark);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-light);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .tag {
    padding: 4px 10px;
    background: var(--sage-pale);
    border-radius: 20px;
    font-size: 11px;
    color: var(--sage-deep);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 1px solid var(--sage-pale);
  }

  .card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--dark);
  }

  .card-price small {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 2px;
  }

  .card-rating {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--earth);
  }

  /* ── AREA SECTION ── */
  .area-section {
    background: var(--dark);
    padding: 60px 24px;
    margin: 20px 0;
  }

  .area-section .section-title {
    color: var(--cream);
    margin-bottom: 4px;
  }

  .area-section .section-title span { color: var(--sage-light); }

  .area-desc {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
    padding: 0;
  }

  .area-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }

  .area-card {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 3/4;
    transition: transform 0.3s ease;
  }

  .area-card:hover { transform: scale(1.03); }

  .area-card-bg {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding: 16px;
    font-size: 48px;
    position: relative;
  }

  .area-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
  }

  .area-name {
    position: relative;
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 400;
    color: white;
    line-height: 1.2;
  }

  .area-count {
    position: relative;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(245, 240, 232, 0.95);
    backdrop-filter: blur(16px);
    border-top: 1px solid rgba(122, 158, 142, 0.2);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    z-index: 100;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px 16px;
    border-radius: 12px;
    transition: all 0.2s;
    border: none;
    background: transparent;
  }

  .nav-item.active .nav-icon { color: var(--sage-deep); }
  .nav-item.active .nav-label { color: var(--sage-deep); font-weight: 500; }

  .nav-icon { font-size: 22px; color: var(--text-muted); }
  .nav-label { font-size: 10px; color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; }

  /* ── DETAIL OVERLAY ── */
  .detail-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--warm-white);
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .detail-overlay.open { transform: translateX(0); }

  .detail-header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: rgba(245, 240, 232, 0.92);
    backdrop-filter: blur(12px);
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .detail-img {
    width: 100%;
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
  }

  .detail-body {
    padding: 24px 24px 120px;
  }

  .detail-area {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .detail-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--dark);
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .detail-price-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .detail-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--dark);
  }

  .detail-rating {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--earth);
    font-size: 14px;
  }

  .detail-divider {
    height: 1px;
    background: var(--sage-pale);
    margin: 20px 0;
  }

  .detail-section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: var(--dark);
    margin-bottom: 12px;
  }

  .amenities-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .amenity {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 8px;
    background: var(--sage-pale);
    border-radius: 14px;
    font-size: 12px;
    color: var(--text-light);
    text-align: center;
  }

  .amenity-icon { font-size: 22px; }

  .book-bar {
    position: fixed;
    bottom: 60px;
    left: 0; right: 0;
    padding: 12px 24px;
    background: rgba(245, 240, 232, 0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--sage-pale);
    display: none;
  }

  .book-bar.show { display: block; }

  .book-btn {
    width: 100%;
    padding: 16px;
    background: var(--sage-deep);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.25s;
  }

  .book-btn:hover { background: var(--dark); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .area-grid { grid-template-columns: repeat(3, 1fr); }
    .lang-bar { padding: 12px 16px; }
    .lang-btn { padding: 5px 10px; font-size: 11px; }
  }

  .main-content { padding-bottom: 80px; }

  /* 카드 이미지 그라디언트 배경 */
  .grad-1 { background: linear-gradient(135deg, #7a9e8e 0%, #4a7c6f 100%); }
  .grad-2 { background: linear-gradient(135deg, #c4a882 0%, #8b7355 100%); }
  .grad-3 { background: linear-gradient(135deg, #a8c5b5 0%, #7a9e8e 100%); }
  .grad-4 { background: linear-gradient(135deg, #d4e6dd 0%, #a8c5b5 100%); }
  .grad-5 { background: linear-gradient(135deg, #4a7c6f 0%, #1e2a25 100%); }
  .grad-6 { background: linear-gradient(135deg, #8b7355 0%, #4a7c6f 100%); }

  .area-grad-1 { background: linear-gradient(160deg, #7a9e8e, #1e2a25); }
  .area-grad-2 { background: linear-gradient(160deg, #c4a882, #8b7355); }
  .area-grad-3 { background: linear-gradient(160deg, #4a7c6f, #1e2a25); }
  .area-grad-4 { background: linear-gradient(160deg, #a8c5b5, #4a7c6f); }
  .area-grad-5 { background: linear-gradient(160deg, #8b7355, #1e2a25); }
  .area-grad-6 { background: linear-gradient(160deg, #d4e6dd, #7a9e8e); }
</style>
</head>
<body>

<!-- 언어 바 -->
<header class="lang-bar">
  <div class="logo">Jeju <span>Stay</span></div>
  <div class="lang-buttons">
    <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('ja')">日本語</button>
  </div>
</header>

<!-- 메인 콘텐츠 -->
<main class="main-content">

  <!-- 히어로 -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="orb hero-orb orb1"></div>
    <div class="orb hero-orb orb2"></div>
    <div class="orb hero-orb orb3"></div>

    <p class="hero-eyebrow" id="txt-eyebrow">제주의 모든 숙소를 한곳에</p>
    <h1 class="hero-title">제주에서의<br><em>특별한 하루</em></h1>
    <p class="hero-subtitle" id="txt-subtitle">바람이 머무는 곳, 당신의 쉼표</p>

    <div class="search-wrap">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="지역, 숙소명으로 검색하세요">
        <button class="search-btn" id="txt-search-btn">검색</button>
      </div>
    </div>
  </section>

  <!-- 필터 -->
  <section class="filters-section">
    <div class="filter-group">
      <span class="filter-label" id="txt-filter-area">지역</span>
      <div class="filter-chips" id="area-chips">

// ── 언어 설정 ──
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const t = i18n[lang];
  document.getElementById('txt-eyebrow').textContent = t.eyebrow;
  document.getElementById('txt-subtitle').textContent = t.subtitle;
  document.getElementById('search-input').placeholder = t.searchPlaceholder;
  document.getElementById('txt-search-btn').textContent = t.searchBtn;
  document.getElementById('txt-filter-area').textContent = t.filterArea;
  document.getElementById('txt-filter-type').textContent = t.filterType;
  document.getElementById('txt-rec').innerHTML = t.rec + ' <span>' + t.recSub + '</span>';
  document.getElementById('txt-viewall').textContent = t.viewAll;
  document.getElementById('txt-area-sec').innerHTML = t.areaSec + ' <span>' + t.areaSecSub + '</span>';
  document.getElementById('txt-back').textContent = t.back;
  document.getElementById('txt-amenities').textContent = t.amenities;
  document.getElementById('txt-tags-label').textContent = t.tagsLabel;
  document.getElementById('txt-book-btn').textContent = t.bookBtn;
  document.getElementById('nav-home').textContent = t.navHome;
  document.getElementById('nav-search').textContent = t.navSearch;
  document.getElementById('nav-map').textContent = t.navMap;
  document.getElementById('nav-saved').textContent = t.navSaved;
  document.getElementById('nav-my').textContent = t.navMy;
  document.getElementById('chip-all').textContent = t.chipAll;

  // 지역 칩 번역
  document.querySelectorAll('#area-chips .chip:not(#chip-all)').forEach(btn => {
    const key = btn.getAttribute('data-area');
    if (key && t.areas[key]) btn.textContent = t.areas[key];
  });

  // 유형 칩 번역
  document.querySelectorAll('#type-chips .chip:not(:first-child)').forEach(btn => {
    const key = btn.getAttribute('data-type');
    if (key && t.types[key]) btn.textContent = t.types[key];
  });

  renderCards();
}

// ── 카드 렌더링 ──
function renderCards() {
  const container = document.getElementById('cards-container');
  const lang = currentLang;
  const t = i18n[lang];

  const filtered = stays.filter(s => {
    const areaMatch = currentArea === 'all' || s.area === currentArea;
    const typeMatch = currentType === 'all' || s.type === currentType;
    return areaMatch && typeMatch;
  });

  container.innerHTML = filtered.map(s => {
    const imgHtml = (s.images && s.images[0] && s.images[0].startsWith('http'))
      ? `<div class="card-img-placeholder" style="background-image:url(${s.images[0]}); background-size:cover; background-position:center;"></div>`
      : `<div class="card-img-placeholder ${s.grad || ''}"><span style="font-size:64px;">${s.emoji || '🏨'}</span></div>`;
    const priceHtml = s.price > 0
      ? `${s.price.toLocaleString()}원<small>${t.perNight}</small>`
      : `<span style="color:var(--text-muted)">가격 문의</span>`;
    const descText = s.desc[lang] || s.desc['ko'] || '';
    return `
    <div class="card" onclick="openDetail(${s.id})">
      <div style="position:relative;">
        ${imgHtml}
        <div class="card-badge">${s.typeI18n ? (s.typeI18n[lang]||s.type) : s.type}</div>
        <div class="card-fav">♡</div>
      </div>
      <div class="card-body">
        <div class="card-area">${s.areaI18n ? (s.areaI18n[lang]||s.area) : s.area}</div>
        <div class="card-name">${s.name[lang] || s.name['ko']}</div>
        <div class="card-desc">${descText}</div>
        <div class="card-tags">
          ${s.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
        </div>
        <div class="card-footer">
          <div class="card-price">${priceHtml}</div>
          <div class="card-rating">${s.rating > 0 ? `★ ${s.rating} <span style="color:var(--text-muted);font-size:11px;">(${s.reviews})</span>` : ''}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── 필터 ──
function filterArea(el, area) {
  currentArea = area;
  document.querySelectorAll('#area-chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function filterType(el, type) {
  currentType = type;
  el.closest('.filter-chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function filterAreaFromCard(area) {
  currentArea = area;
  document.querySelectorAll('#area-chips .chip').forEach(c => {
    c.classList.toggle('active', c.textContent === area || (area === 'all' && c.id === 'chip-all'));
  });
  renderCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 상세 페이지 ──
function openDetail(id) {
  const s = stays.find(x => x.id === id);
  const lang = currentLang;
  const t = i18n[lang];

  document.getElementById('detail-area').textContent = (s.areaI18n?.[lang]||s.area) + ' · ' + (s.typeI18n?.[lang]||s.type);
  document.getElementById('detail-name').textContent = s.name[lang];
  document.getElementById('detail-price').innerHTML = s.price > 0
    ? s.price.toLocaleString() + '원 <small style="font-family:\'Noto Sans KR\';font-size:14px;color:var(--text-muted);">' + (t.perNight || '/박') + '</small>'
    : '<span style="color:var(--text-muted);font-size:14px;">가격 문의</span>';
  document.getElementById('detail-rating').innerHTML = s.rating > 0
    ? '★ ' + s.rating + ' <span style="color:var(--text-muted);font-size:12px;">(' + s.reviews + '개 후기)</span>'
    : '';
  document.getElementById('detail-desc').textContent = s.desc[lang];

  document.getElementById('detail-amenities').innerHTML = s.amenities.map(a =>
    `<div class="amenity"><span class="amenity-icon">${a[0]}</span>${a[1]}</div>`
  ).join('');

  document.getElementById('detail-tags').innerHTML = s.tags.map(tag =>
    `<span class="tag">${tag}</span>`
  ).join('');

  // 위치 및 구글맵
  const addr = s.address || '';
  document.getElementById('detail-address').textContent = addr ? '📍 ' + addr : '';

  const mapQuery = (s.lat && parseFloat(s.lat) > 0)
    ? `${s.lat},${s.lng}`
    : encodeURIComponent(s.name.ko + ' 제주');
  document.getElementById('detail-map').src =
    `https://maps.google.com/maps?q=${mapQuery}&z=15&output=embed&hl=ko`;

  // 구글맵 외부 링크
  const extLink = (s.lat && parseFloat(s.lat) > 0)
    ? `https://maps.google.com/maps?q=${s.lat},${s.lng}&z=15`
    : `https://maps.google.com/maps?q=${encodeURIComponent(s.name.ko + ' 제주')}`;
  document.getElementById('detail-map-link').href = extLink;

  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('detail-map').src = '';
}

// ── 홈으로 ──
function showHome() {
  document.getElementById('map-view').style.display = 'none';
  document.querySelector('main').style.display = '';
}

// ── 전체 지도 뷰 ──
function showMap() {
  document.getElementById('map-view').style.display = 'flex';
  document.querySelector('main').style.display = 'none';
}

function closeMap() {
  document.getElementById('map-view').style.display = 'none';
  document.querySelector('main').style.display = '';
}

// ── 초기화 ──
renderCards();
